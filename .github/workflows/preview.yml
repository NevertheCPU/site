name: Deploy PR previews

on:
    pull_request:
        types:
            - opened
            - reopened
            - synchronize
            - closed

concurrency: preview-${{ github.ref }}

jobs:
    deploy-preview:
        if: github.event.action != 'closed'
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Ruby
              uses: ruby/setup-ruby@v1 # Updated to the latest stable version
              with:
                ruby-version: '3.1' # Not needed with a .ruby-version file
                bundler-cache: true # runs 'bundle install' and caches installed gems automatically
                cache-version: 0 # Increment this number if you need to re-download cached gems
            - name: Setup Pages
              id: pages
              uses: actions/configure-pages@v4 # Updated to the latest version
            - name: Build with Jekyll
              # Outputs to the './_site' directory by default
              run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
              env:
                JEKYLL_ENV: development
            - name: Upload artifact
                # Automatically uploads an artifact from the './_site' directory by default
              uses: actions/upload-pages-artifact@v3

            - name: Deploy preview
              uses: rossjrw/pr-preview-action@v1
              with:
                  source-dir: ./_site/
                  action: deploy
                  preview-branch: main
                  qr-code: true
                  pages-base-url: "neverthecpu.github.io${{ steps.pages.outputs.base_path }}"


    remove-preview:
        if: github.event.action == 'closed'
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Ruby
              uses: ruby/setup-ruby@v1 # Updated to the latest stable version
              with:
                ruby-version: '3.1' # Not needed with a .ruby-version file
                bundler-cache: true # runs 'bundle install' and caches installed gems automatically
                cache-version: 0 # Increment this number if you need to re-download cached gems
            - name: Remove artifact
                # Automatically uploads an artifact from the './_site' directory by default
              uses: remagpie/gha-remove-artifact@17a089caac8f6b2bbcb3a2dab795ec6228e7d6e2

            - name: Deploy preview
              uses: rossjrw/pr-preview-action@v1
              with:
                  source-dir: ./_site/
                  action: remove
                  preview-branch: main
