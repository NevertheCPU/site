<div class="reviewers">
  {% assign reviewers = site.data.reviewers %}
  {% for reviewer in reviewers %}
    <div class="reviewer-card">
      <style>
        .circle-image {border-radius: 50%; object-fit: cover;}
          <a href="{{ reviewer.url }}" target="_blank" rel="noopener noreferrer" aria-label="Visit {{ reviewer.name }} website">
            <img loading="lazy" decoding="async" src="/assets/images/reviewer/{{ reviewer.headshot }}" alt="{{ reviewer.name }}"{% if reviewer.scale %} style="transform: scale({{ reviewer.scale }});"{% endif %}>
          </a>
      </style>
    </div>
  {% endfor %}
</div>
